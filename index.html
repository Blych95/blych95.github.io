<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlychLife · Gestiona tu vida</title>
  <meta name="description" content="BlychLife: tareas, metas, objetivos, hábitos, áreas de vida, energía y reflexión en un solo lugar.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232F6BFF'/><text x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>B</text></svg>">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="logo">B</span>
        <span><b>Blych</b><span class="accent">Life</span></span>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="side-foot">
        <button data-action="export">⬇ Exportar respaldo</button>
        <button data-action="import">⬆ Importar respaldo</button>
        <button class="reset" data-action="reset">🗑 Borrar todos los datos</button>
      </div>
    </aside>

    <div class="main">
      <div class="topbar">
        <button id="menu-toggle" aria-label="Abrir menú">☰</button>
        <div class="brand" style="padding:0;font-size:1.2rem;"><b>Blych</b><span class="accent">Life</span></div>
      </div>
      <main class="content" id="content"></main>
    </div>
  </div>

  <input type="file" id="import-file" accept="application/json" hidden>

  <!-- Barra de navegación inferior (solo teléfonos) -->
  <nav class="tabbar" id="tabbar" aria-label="Navegación inferior"></nav>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
